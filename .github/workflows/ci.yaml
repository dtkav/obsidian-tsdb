name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Use Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24.x"
          cache: npm
      - run: npm ci
      - run: npm run build:tsdb-wasm
      - run: npm run build
      - run: npm run test --if-present
      - run: npm run verify-release
